name: Build proot ARM64 Static

on:
  schedule:
    - cron: '0 0 */10 * *'  # Every 10 days
  workflow_dispatch:

env:
  PROOT_REPO: "https://github.com/termux/proot.git"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone proot latest source
        id: clone
        run: |
          # 克隆最新代码
          git clone --depth=1 "$PROOT_REPO" proot-src
          cd proot-src

          # 获取 commit 信息
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          # 获取最新 tag
          git fetch --depth=1 origin "refs/tags/*:refs/tags/*" 2>/dev/null || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "version=$LATEST_TAG-$SHA" >> $GITHUB_OUTPUT

          echo "=== proot 版本信息 ==="
          echo "Latest Tag: $LATEST_TAG"
          echo "Commit: $SHA"
          echo ""

      - name: Check if version already released
        id: check-release
        run: |
          TAG="${{ steps.clone.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.check-release.outputs.tag }} already released. Skipping."
          exit 78

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-dev \
            libseccomp-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            make \
            git \
            bc

      - name: Build static libtalloc
        run: |
          # 从源码编译 static libtalloc
          cd /tmp
          curl -sL https://github.com/talloc/talloc/archive/refs/tags/v2.4.0.tar.gz -o talloc.tar.gz
          tar -xzf talloc.tar.gz
          cd talloc-2.4.0
          ./autogen.sh
          ./configure --host=aarch64-linux-gnu --prefix=/usr/local --enable-static --disable-shared
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build proot
        run: |
          cd proot-src
          # 修补 loader 链接选项
          sed -i 's/,--rosegment,/,/' src/GNUmakefile
          # 禁用 32 位 loader
          sed -i '/define_from_arch.h,,HAS_LOADER_32BIT/a HAS_LOADER_32BIT :=' src/GNUmakefile
          # 静态链接构建
          make -C src proot GIT=false \
            PYTHON_CONFIG=/bin/false \
            HAS_PYTHON_CONFIG="" \
            LDFLAGS="-static" \
            PKG_CONFIG_PATH="/usr/local/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH"

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          file dist/proot-*
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          ls -lh dist/

      - name: Verify Binary
        run: |
          set -e
          cd dist
          PROOT_BIN=$(ls proot-*-arm64-linux-glibc)
          VERSION="${{ steps.clone.outputs.version }}"
          VERIFY_LOG="verification-report-$VERSION.txt"

          {
            echo "proot ARM64 Verification Report"
            echo "================================"
            echo "Version: $VERSION"
            echo "Date: ${{ steps.clone.outputs.date }}"
            echo "Commit: ${{ steps.clone.outputs.sha }}"
            echo ""

            echo "=== 1. ELF Architecture Verification ==="
            readelf -h "$PROOT_BIN" | grep -E "Machine:|Class:|Type:" || echo "ELF header check failed"
            echo ""

            echo "=== 2. Build Hardening Flags ==="
            readelf -h "$PROOT_BIN" | grep -E "Type:" && echo "ELF type check passed" || echo "ELF type check failed"
            readelf -l "$PROOT_BIN" | grep -E "GNU_RELRO|GNU_STACK" || echo "RELRO/NX: check complete"
            echo ""

            echo "=== 3. Dynamic Linking Check ==="
            if ldd "$PROOT_BIN" 2>&1 | grep -q "not a dynamic executable\|statically linked"; then
              echo "Status: Static binary confirmed"
            else
              echo "Status: Uses dynamic linking - checking dependencies..."
              ldd "$PROOT_BIN" | head -5
            fi
            echo ""

            echo "=== 4. File Type and Permissions ==="
            file "$PROOT_BIN"
            ls -la "$PROOT_BIN"
            echo ""

            echo "=== 5. Binary Size Check ==="
            SIZE=$(stat -c%s "$PROOT_BIN")
            SIZE_MB=$(echo "scale=2; $SIZE/1024/1024" | bc)
            echo "Size: $SIZE bytes ($SIZE_MB MB)"
            if [ "$SIZE" -gt 500000 ]; then
              echo "Size: OK (proot binary > 500KB)"
            else
              echo "Size: WARNING (may be incomplete)"
            fi
            echo ""

            echo "=== 6. Executable Check ==="
            if [ -x "$PROOT_BIN" ]; then
              echo "Executable: YES"
            else
              chmod +x "$PROOT_BIN"
              echo "Executable: FIXED"
            fi
            echo ""

            echo "=== 7. Basic proot Help ==="
            ./"$PROOT_BIN" --help 2>&1 | head -20
            echo ""

            echo "=== 8. proot Version Info ==="
            ./"$PROOT_BIN" -V 2>&1 || ./"$PROOT_BIN" --version 2>&1 || echo "Version info not available"
            echo ""

            echo "=== Verification Complete ==="
          } | tee "$VERIFY_LOG"

          echo ""
          echo "Verification report saved to: $VERIFY_LOG"

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag }}
          name: "proot ${{ steps.check-release.outputs.tag }}"
          body: |
            ## proot ARM64 Static Build

            **Version:** `${{ steps.check-release.outputs.tag }}`
            **Date:** `${{ steps.clone.outputs.date }}`
            **Commit:** [`${{ steps.clone.outputs.sha }}`](https://github.com/proot-me/proot/commit/${{ steps.clone.outputs.sha }})

            ### Architecture
            - CPU: ARM64 (aarch64)
            - C Library: glibc
            - Link: Static
            - Source: [proot-me/proot](https://github.com/proot-me/proot)

            ### Verification Report
            ```
            $(cat dist/verification-report-${{ steps.clone.outputs.version }}.txt)
            ```

            ### Usage
            ```bash
            tar -xzf proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz
            ./proot -h
            ```
          files: dist/proot-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
