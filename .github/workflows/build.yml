name: Build proot ARM64 Static

on:
  schedule:
    - cron: '0 0 */10 * *'  # Every 10 days
  workflow_dispatch:

env:
  PROOT_REPO: "https://github.com/termux/proot.git"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone proot latest source
        id: clone
        run: |
          git clone --depth=1 "$PROOT_REPO" proot-src
          cd proot-src

          # Termux proot 使用 v2.x.x 版本格式
          # 获取最新 tag
          git fetch --depth=1 origin "refs/tags/*:refs/tags/*" 2>/dev/null
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # 获取 commit 信息
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$LATEST_TAG-$SHA" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          echo "=== Termux proot 版本信息 ==="
          echo "Latest Tag: $LATEST_TAG"
          echo "Commit: $SHA"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo ""
          echo "=== 最新 commit ==="
          git log -1 --oneline

      - name: Check if version already released
        id: check-release
        run: |
          # 使用 version 输出作为 tag (格式: vX.Y.Z-commithash)
          TAG="${{ steps.clone.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.check-release.outputs.tag }} already released. Skipping."
          exit 78

      - name: Setup ARM64 cross-compile environment
        run: |
          # Use Ubuntu ports for ARM64 packages
          sudo rm -f /etc/apt/sources.list
          cat > /tmp/sources.list << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-backports main restricted universe multiverse
          EOF
          sudo cp /tmp/sources.list /etc/apt/sources.list

          # Add arm64 architecture
          sudo dpkg --add-architecture arm64

          # Update
          sudo apt-get update

          # Install ARM64 cross-compile toolchain
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libtalloc-dev:arm64 \
            libarchive-dev:arm64 \
            libseccomp-dev:arm64 \
            make \
            git

      - name: Build proot
        run: |
          cd proot-src
          # Set PKG_CONFIG_PATH to find ARM64 libraries (correct path)
          export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH"
          make -C src proot GIT=false \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=aarch64-linux-gnu-gcc \
            PYTHON_CONFIG=/bin/false \
            HAS_PYTHON_CONFIG=""

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          file dist/proot-*
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          ls -lh dist/

      - name: Verify Binary
        run: |
          cd dist
          PROOT_BIN=$(ls proot-*-arm64-linux-glibc)
          VERIFY_LOG="verification-report-${{ steps.clone.outputs.version }}.txt"

          {
            echo "proot ARM64 Verification Report"
            echo "================================"
            echo "Version: ${{ steps.clone.outputs.tag }}"
            echo "Date: ${{ steps.clone.outputs.date }}"
            echo "Commit: ${{ steps.clone.outputs.sha }}"
            echo ""

            echo "=== 1. ELF Architecture Verification ==="
            readelf -h "$PROOT_BIN" | grep -E "Machine:|Class:|Type:"
            echo ""

            echo "=== 2. Build Hardening Flags ==="
            readelf -h "$PROOT_BIN" | grep -E "Type:.*EXEC" && echo "PIE: YES (EXEC type)" || echo "PIE: NO"
            readelf -l "$PROOT_BIN" | grep -E "GNU_RELRO|GNU_STACK" || echo "RELRO/NX: N/A"
            echo ""

            echo "=== 3. Dynamic Linking Check ==="
            if ldd "$PROOT_BIN" 2>&1 | grep -q "statically linked"; then
              echo "Status: Statically linked (good)"
            else
              echo "Warning: Not fully static"
              ldd "$PROOT_BIN"
            fi
            echo ""

            echo "=== 4. ptrace System Call Test ==="
            cat > /tmp/test_ptrace.c << 'EOF'
            #define _GNU_SOURCE
            #include <sys/ptrace.h>
            #include <stdio.h>
            int main() {
              long result = ptrace(PTRACE_TRACEME, 0, NULL, NULL);
              printf("ptrace(PTRACE_TRACEME) = %ld\n", result);
              return result == -1 ? 1 : 0;
            }
            EOF
            aarch64-linux-gnu-gcc /tmp/test_ptrace.c -o /tmp/test_ptrace
            ./proot-src/src/proot /tmp/test_ptrace && echo "ptrace: SUPPORTED" || echo "ptrace: NOT SUPPORTED"
            echo ""

            echo "=== 5. File Type and Permissions ==="
            file "$PROOT_BIN"
            ls -la "$PROOT_BIN"
            echo ""

            echo "=== 6. Binary Size Check ==="
            SIZE=$(stat -c%s "$PROOT_BIN")
            echo "Size: $SIZE bytes ($(echo "scale=2; $SIZE/1024/1024" | bc) MB)"
            [ "$SIZE" -gt 1000000 ] && echo "Size: OK (proot binary > 1MB)" || echo "Size: WARNING (may be incomplete)"
            echo ""

            echo "=== 7. chroot Simulation Test ==="
            mkdir -p /tmp/proot-test/{bin,lib}
            cp proot-src/src/proot /tmp/proot-test/
            ./proot-src/src/proot -r /tmp/proot-test /bin/ls /tmp/proot-test > /dev/null 2>&1 && echo "chroot simulation: OK" || echo "chroot simulation: FAILED"
            rm -rf /tmp/proot-test
            echo ""

            echo "=== 8. Directory Mount Simulation Test ==="
            mkdir -p /tmp/proot-mount-test/{proc,sys,dev,system/lib}
            touch /tmp/proot-mount-test/testfile
            ./proot-src/src/proot -m /proc:/proc -m /sys:/sys -m /dev:/dev -m /system:/system \
              chroot /tmp/proot-mount-test /bin/ls / > /dev/null 2>&1 && echo "mount simulation: OK" || echo "mount simulation: FAILED"
            rm -rf /tmp/proot-mount-test
            echo ""

            echo "=== 9. User/Permission Simulation Test ==="
            mkdir -p /tmp/proot-user-test
            ./proot-src/src/proot -0 -i 0:0 id > /tmp/proot-id.out 2>&1
            if grep -q "uid=0(root)" /tmp/proot-id.out; then
              echo "user simulation: OK (root emulation works)"
            else
              cat /tmp/proot-id.out
              echo "user simulation: PARTIAL"
            fi
            rm -rf /tmp/proot-user-test
            echo ""

            echo "=== 10. Read Compatibility Test (Android high version) ==="
            mkdir -p /tmp/proot-read-test/{proc,system,vendor,data}
            for dir in /proc/1 /system /vendor /data; do
              ./proot-src/src/proot -r /tmp/proot-read-test ls $dir > /dev/null 2>&1 \
                && echo "$dir: READ OK" || echo "$dir: READ FAILED"
            done
            ./proot-src/src/proot cat /proc/1/cmdline > /dev/null 2>&1 \
              && echo "/proc/[pid]/cmdline: READ OK" || echo "/proc/[pid]/cmdline: READ FAILED"
            rm -rf /tmp/proot-read-test
            echo ""

            echo "=== 11. Seccomp Filter Check (Android 14-16 Compatibility) ==="
            ./proot-src/src/proot --help 2>&1 | grep -iE "seccomp|scfilter" && echo "seccomp: SUPPORTED" || echo "seccomp: Native mode"
            for syscall in ptrace openat2 quotacte; do
              ./proot-src/src/proot -S /bin/true 2>&1 | grep -qi "seccomp" && echo "$syscall: FILTERED" || echo "$syscall: OK"
            done
            echo ""

            echo "=== 12. Termux/Linux Emulation Compatibility ==="
            mkdir -p /tmp/proot-termux-test/{data/data/com.termux/files/usr,proc/self}
            ./proot-src/src/proot cat /proc/self/cmdline > /dev/null 2>&1 \
              && echo "/proc/self: OK" || echo "/proc/self: FAILED"
            ./proot-src/src/proot -w /data/data/com.termux/files/home echo $HOME > /tmp/proot-home.out 2>&1 \
              && cat /tmp/proot-home.out || echo "HOME emulation: FAILED"
            rm -rf /tmp/proot-termux-test
            echo ""

            echo "=== 13. Android 14-16 System Call Blocklist Test ==="
            cat > /tmp/test_syscalls.c << 'EOF'
            #define _GNU_SOURCE
            #include <sys/syscall.h>
            #include <linux/openat2.h>
            #include <stdio.h>
            #include <sys/time.h>
            int main() {
              struct open_how how = {.flags = O_RDONLY};
              long ret = syscall(SYS_openat2, AT_FDCWD, "/", &how, sizeof(how));
              printf("openat2: ret=%ld errno=%d\n", ret, errno);
              return 0;
            }
            EOF
            aarch64-linux-gnu-gcc /tmp/test_syscalls.c -o /tmp/test_syscalls 2>/dev/null
            ./proot-src/src/proot /tmp/test_syscalls 2>&1 | head -3 || echo "Syscall test completed"
            echo ""

            echo "=== 14. Linker and Loader Test (Android-specific) ==="
            mkdir -p /tmp/proot-linker-test
            echo 'int main(){return 0;}' > /tmp/proot-linker-test/test.c
            aarch64-linux-gnu-gcc /tmp/proot-linker-test/test.c -o /tmp/proot-linker-test/test
            ./proot-src/src/proot /tmp/proot-linker-test/test && echo "linker: OK" || echo "linker: FAILED"
            rm -rf /tmp/proot-linker-test
            echo ""

            echo "=== 15. PTY (Pseudo-Terminal) Support Test ==="
            mkdir -p /tmp/proot-pty-test
            cat > /tmp/proot-pty-test/test.c << 'EOF'
            #define _GNU_SOURCE
            #include <stdlib.h>
            #include <stdio.h>
            #include <sys/types.h>
            #include <sys/stat.h>
            #include <fcntl.h>
            #include <unistd.h>
            #include <pty.h>
            int main() {
              int master, slave;
              struct termios term;
              if (openpty(&master, &slave, NULL, &term, NULL) >= 0) {
                printf("PTY: allocated (master=%d, slave=%d)\n", master, slave);
                close(master);
                close(slave);
                return 0;
              }
              printf("PTY: FAILED\n");
              return 1;
            }
            EOF
            aarch64-linux-gnu-gcc /tmp/proot-pty-test/test.c -o /tmp/proot-pty-test/test -lutil
            ./proot-src/src/proot /tmp/proot-pty-test/test && echo "PTY support: OK" || echo "PTY support: FAILED"
            rm -rf /tmp/proot-pty-test
            echo ""

            echo "=== 16. Bind Mount and Overlay Test ==="
            mkdir -p /tmp/proot-mount-test/{upper,lower,work,mnt}
            cat > /tmp/proot-mount-overlay.c << 'EOF'
            #define _GNU_SOURCE
            #include <stdio.h>
            #include <sys/mount.h>
            #include <sys/stat.h>
            #include <unistd.h>
            int main() {
              mkdir("/tmp/lower", 0755);
              mkdir("/tmp/upper", 0755);
              mkdir("/tmp/work", 0755);
              mkdir("/tmp/mnt", 0755);
              int ret = mount("lower", "/tmp/mnt", "overlay", 0, "lowerdir=/tmp/lower,upperdir=/tmp/upper,workdir=/tmp/work");
              printf("overlay mount: ret=%d errno=%d\n", (int)ret, errno);
              return ret;
            }
            EOF
            aarch64-linux-gnu-gcc /tmp/proot-mount-overlay.c -o /tmp/proot-mount-overlay 2>/dev/null
            ./proot-src/src/proot /tmp/proot-mount-overlay 2>&1 | head -2 || echo "Overlay test completed"
            rm -rf /tmp/proot-mount-test /tmp/proot-mount-overlay.c /tmp/proot-mount-overlay
            echo ""

            echo "=== 17. Run Parameters Completeness Check ==="
            echo "--- proot --help output ---"
            ./proot-src/src/proot --help 2>&1 | head -60
            echo ""
            echo "--- Key parameters supported ---"
            ./proot-src/src/proot --help 2>&1 | grep -E "^\s*-" | head -30
            echo ""

            echo "=== 18. Feature Detection Summary ==="
            ./proot-src/src/proot --help 2>&1 | grep -iE "feature|seccomp|ptrace|arm64|aarch64|android|bionic" || echo "Feature info not available in --help"
            echo ""

            echo "=== Verification Complete ==="
          } | tee "$VERIFY_LOG"

          echo ""
          echo "Verification report saved to: $VERIFY_LOG"

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag }}
          name: "proot ${{ steps.check-release.outputs.tag }}"
          body: |
            ## proot ARM64 Static Build

            **Version:** `${{ steps.check-release.outputs.tag }}`
            **Date:** `${{ steps.clone.outputs.date }}`
            **Commit:** [`${{ steps.clone.outputs.version }}`](https://github.com/proot-me/proot/commit/${{ steps.clone.outputs.sha }})

            ### Architecture
            - CPU: ARM64 (aarch64)
            - C Library: glibc
            - Link: Static

            ### Verification Report
            ```
            $(cat dist/verification-report-${{ steps.clone.outputs.version }}.txt)
            ```

            ### Usage
            ```bash
            tar -xzf proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz
            ./proot -h
            ```
          files: dist/proot-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
