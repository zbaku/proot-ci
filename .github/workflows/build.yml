name: Build proot ARM64

on:
  schedule:
    - cron: '0 0 */10 * *'
  workflow_dispatch:

env:
  PROOT_REPO: "https://github.com/termux/proot.git"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Clone proot
        id: clone
        run: |
          git clone --depth=1 "$PROOT_REPO" proot-src
          cd proot-src
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=$LATEST_TAG-$SHA" >> $GITHUB_OUTPUT

      - name: Check release
        id: check
        run: |
          TAG="${{ steps.clone.outputs.version }}"
          RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          [ "$RESP" = "200" ] && echo "exists=true" || echo "exists=false"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - if: steps.check.outputs.exists == 'true'
        run: exit 78

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libtalloc-dev libarchive-dev libseccomp-dev make git bc autoconf automake libtool binutils

      - name: Android ashmem stub
        run: |
          sudo tee /usr/include/linux/ashmem.h > /dev/null << 'EOF'
          #ifndef _LINUX_ASHMEM_H
          #define _LINUX_ASHMEM_H
          #include <sys/ioctl.h>
          #define ASHMEM_GET_SIZE _IO('a', 3)
          #define ASHMEM_SET_SIZE _IO('a', 5)
          #define ASHMEM_SET_NAME _IO('a', 1)
          #define ASHMEM_GET_NAME _IO('a', 2)
          #define ASHMEM_PIN _IO('a', 7)
          #define ASHMEM_UNPIN _IO('a', 8)
          #define ASHMEM_MAP _IO('a', 9)
          #define ASHMEM_UNMAP _IO('a', 10)
          #define ASHMEM_VERSION _IO('a', 0)
          #define ASHMEM_NAME_LEN 256
          struct ashmem_pin { unsigned int offset; unsigned int len; };
          struct ashmem_info { unsigned int size; unsigned int prot; char name[ASHMEM_NAME_LEN]; };
          #endif
          EOF

      - name: Build talloc static
        run: |
          cd /tmp
          curl -sL https://www.samba.org/ftp/talloc/talloc-2.4.0.tar.gz -o talloc.tar.gz
          tar -xzf talloc.tar.gz
          cd talloc-2.4.0
          PYTHONHASHSEED=1 ./buildtools/bin/waf configure
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build
        run: |
          cd proot-src
          sed -i 's/,--rosegment,/,/' src/GNUmakefile
          sed -i '/define_from_arch.h,,HAS_LOADER_32BIT/a HAS_LOADER_32BIT :=' src/GNUmakefile
          make -C src proot GIT=false PYTHON_CONFIG=/bin/false HAS_PYTHON_CONFIG="" LDFLAGS="-static -L/usr/local/lib"

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc

      - name: Verify
        run: |
          cd dist
          TARBALL=$(ls proot-*.tar.gz)
          BINARY="${TARBALL%.tar.gz}"

          echo "=== Extract binary ==="
          tar -xzf "${TARBALL}"
          echo "✓ Extracted: ${BINARY}"

          echo ""
          echo "=== ELF Architecture ==="
          readelf -h "${BINARY}" | grep -E "Machine:|Class:|Type:"
          MACHINE=$(readelf -h "${BINARY}" | grep Machine | awk '{print $2}')
          [ "${MACHINE}" = "AArch64" ] && echo "✓ 架构: AArch64" || { echo "✗ 架构错误: ${MACHINE}"; exit 1; }

          echo ""
          echo "=== File Type ==="
          file "${BINARY}"

          echo ""
          echo "=== Static Linking Verification ==="
          LDD_OUTPUT=$(ldd "${BINARY}" 2>&1)
          if echo "${LDD_OUTPUT}" | grep -qi "not a dynamic\|statically linked"; then
            echo "✓ 静态链接"
            DYN_DEPS=$(echo "${LDD_OUTPUT}" | grep "=>" | grep -v "not a dynamic" | wc -l)
            [ "${DYN_DEPS}" -eq 0 ] && echo "✓ 无动态依赖" || { echo "✗ 存在 ${DYN_DEPS} 个动态依赖"; exit 1; }
          else
            echo "✗ 动态链接"
            echo "${LDD_OUTPUT}"
            exit 1
          fi

          echo ""
          echo "=== Required Symbols ==="
          nm "${BINARY}" 2>/dev/null | grep -q "talloc" && echo "✓ talloc 符号存在" || echo "⚠ talloc 符号未找到"

          echo ""
          echo "=== Binary Size ==="
          ls -lh "${BINARY}"
          SIZE=$(stat -c%s "${BINARY}")
          [ ${SIZE} -gt 1048576 ] && echo "✓ 大小: ${SIZE} bytes (> 1MB)" || { echo "✗ 大小过小: ${SIZE} bytes"; exit 1; }

          echo ""
          echo "=== Executable Permission ==="
          [ -x "${BINARY}" ] && echo "✓ 可执行权限正常" || { echo "✗ 缺少可执行权限"; exit 1; }

      - name: Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          body: |
            proot ARM64 build - ${{ steps.clone.outputs.version }}
          files: dist/proot-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
