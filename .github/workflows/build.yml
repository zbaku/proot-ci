name: Build proot ARM64 Static

on:
  schedule:
    - cron: '0 0 */10 * *'  # Every 10 days
  workflow_dispatch:

env:
  PROOT_REPO: "https://github.com/termux/proot.git"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone proot latest source
        id: clone
        run: |
          # 获取最新 tag
          TAGS_JSON=$(curl -s "https://api.github.com/repos/termux/proot/tags")
          LATEST_TAG=$(echo "$TAGS_JSON" | grep -o '"name": "[^"]*"' | head -1 | cut -d'"' -f4)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # 克隆最新代码
          git clone --depth=1 "$PROOT_REPO" proot-src
          cd proot-src

          # 获取 commit 信息
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$LATEST_TAG-$SHA" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          echo "=== Termux proot 版本信息 ==="
          echo "Latest Tag: $LATEST_TAG"
          echo "Commit: $SHA"
          echo ""

      - name: Check if version already released
        id: check-release
        run: |
          TAG="${{ steps.clone.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.check-release.outputs.tag }} already released. Skipping."
          exit 78

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libtalloc-dev \
            libarchive-dev \
            libseccomp-dev \
            make \
            git

      - name: Build proot
        run: |
          cd proot-src
          make -C src proot GIT=false \
            PYTHON_CONFIG=/bin/false \
            HAS_PYTHON_CONFIG=""

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          file dist/proot-*
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          ls -lh dist/

      - name: Verify Binary
        run: |
          cd dist
          PROOT_BIN=$(ls proot-*-arm64-linux-glibc)
          VERIFY_LOG="verification-report-${{ steps.clone.outputs.version }}.txt"

          {
            echo "proot ARM64 Verification Report"
            echo "================================"
            echo "Version: ${{ steps.clone.outputs.tag }}"
            echo "Date: ${{ steps.clone.outputs.date }}"
            echo "Commit: ${{ steps.clone.outputs.sha }}"
            echo ""

            echo "=== 1. ELF Architecture Verification ==="
            readelf -h "$PROOT_BIN" | grep -E "Machine:|Class:|Type:"
            echo ""

            echo "=== 2. Build Hardening Flags ==="
            readelf -h "$PROOT_BIN" | grep -E "Type:.*EXEC" && echo "PIE: YES (EXEC type)" || echo "PIE: NO"
            readelf -l "$PROOT_BIN" | grep -E "GNU_RELRO|GNU_STACK" || echo "RELRO/NX: N/A"
            echo ""

            echo "=== 3. Dynamic Linking Check ==="
            if ldd "$PROOT_BIN" 2>&1 | grep -q "statically linked"; then
              echo "Status: Statically linked (good)"
            else
              echo "Warning: Not fully static"
              ldd "$PROOT_BIN"
            fi
            echo ""

            echo "=== 4. ptrace System Call Test ==="
            ./proot-src/src/proot /bin/true && echo "ptrace: SUPPORTED" || echo "ptrace: NOT SUPPORTED"
            echo ""

            echo "=== 5. File Type and Permissions ==="
            file "$PROOT_BIN"
            ls -la "$PROOT_BIN"
            echo ""

            echo "=== 6. Binary Size Check ==="
            SIZE=$(stat -c%s "$PROOT_BIN")
            echo "Size: $SIZE bytes ($(echo "scale=2; $SIZE/1024/1024" | bc) MB)"
            [ "$SIZE" -gt 1000000 ] && echo "Size: OK (proot binary > 1MB)" || echo "Size: WARNING (may be incomplete)"
            echo ""

            echo "=== 7. chroot Simulation Test ==="
            mkdir -p /tmp/proot-test/{bin,lib}
            ./proot-src/src/proot -r /tmp/proot-test /bin/ls /tmp/proot-test > /dev/null 2>&1 && echo "chroot simulation: OK" || echo "chroot simulation: FAILED"
            rm -rf /tmp/proot-test
            echo ""

            echo "=== 8. Directory Mount Simulation Test ==="
            mkdir -p /tmp/proot-mount-test/{proc,sys,dev,system/lib}
            touch /tmp/proot-mount-test/testfile
            ./proot-src/src/proot -m /proc:/proc -m /sys:/sys -m /dev:/dev -m /system:/system \
              chroot /tmp/proot-mount-test /bin/ls / > /dev/null 2>&1 && echo "mount simulation: OK" || echo "mount simulation: FAILED"
            rm -rf /tmp/proot-mount-test
            echo ""

            echo "=== 9. User/Permission Simulation Test ==="
            ./proot-src/src/proot -0 -i 0:0 id > /tmp/proot-id.out 2>&1
            if grep -q "uid=0(root)" /tmp/proot-id.out; then
              echo "user simulation: OK (root emulation works)"
            else
              cat /tmp/proot-id.out
              echo "user simulation: PARTIAL"
            fi
            rm -rf /tmp/proot-user-test
            echo ""

            echo "=== 10. Read Compatibility Test (Android high version) ==="
            mkdir -p /tmp/proot-read-test/{proc,system,vendor,data}
            for dir in /proc/1 /system /vendor /data; do
              ./proot-src/src/proot -r /tmp/proot-read-test ls $dir > /dev/null 2>&1 \
                && echo "$dir: READ OK" || echo "$dir: READ FAILED"
            done
            ./proot-src/src/proot cat /proc/1/cmdline > /dev/null 2>&1 \
              && echo "/proc/[pid]/cmdline: READ OK" || echo "/proc/[pid]/cmdline: READ FAILED"
            rm -rf /tmp/proot-read-test
            echo ""

            echo "=== 11. Seccomp Filter Check (Android 14-16 Compatibility) ==="
            ./proot-src/src/proot --help 2>&1 | grep -iE "seccomp|scfilter" && echo "seccomp: SUPPORTED" || echo "seccomp: Native mode"
            echo ""

            echo "=== 12. Termux/Linux Emulation Compatibility ==="
            ./proot-src/src/proot cat /proc/self/cmdline > /dev/null 2>&1 \
              && echo "/proc/self: OK" || echo "/proc/self: FAILED"
            ./proot-src/src/proot -w /data/data/com.termux/files/home echo $HOME > /tmp/proot-home.out 2>&1 \
              && cat /tmp/proot-home.out || echo "HOME emulation: FAILED"
            rm -rf /tmp/proot-termux-test
            echo ""

            echo "=== 13. PTY (Pseudo-Terminal) Support Test ==="
            ./proot-src/src/proot -0 /bin/bash -c "tty" > /tmp/tty.out 2>&1 && echo "PTY support: OK" || echo "PTY support: PARTIAL"
            rm -rf /tmp/proot-pty-test
            echo ""

            echo "=== 14. Run Parameters Completeness Check ==="
            echo "--- proot --help output ---"
            ./proot-src/src/proot --help 2>&1 | head -60
            echo ""

            echo "=== Verification Complete ==="
          } | tee "$VERIFY_LOG"

          echo ""
          echo "Verification report saved to: $VERIFY_LOG"

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag }}
          name: "proot ${{ steps.check-release.outputs.tag }}"
          body: |
            ## proot ARM64 Static Build

            **Version:** `${{ steps.check-release.outputs.tag }}`
            **Date:** `${{ steps.clone.outputs.date }}`
            **Commit:** [`${{ steps.clone.outputs.sha }}`](https://github.com/termux/proot/commit/${{ steps.clone.outputs.sha }})

            ### Architecture
            - CPU: ARM64 (aarch64)
            - C Library: glibc
            - Link: Static
            - Source: [termux/proot](https://github.com/termux/proot)

            ### Verification Report
            ```
            $(cat dist/verification-report-${{ steps.clone.outputs.version }}.txt)
            ```

            ### Usage
            ```bash
            tar -xzf proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz
            ./proot -h
            ```
          files: dist/proot-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
