name: Build proot ARM64 Static

on:
  schedule:
    - cron: '0 0 */10 * *'  # Every 10 days
  workflow_dispatch:

env:
  PROOT_REPO: "https://github.com/termux/proot.git"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone proot latest source
        id: clone
        run: |
          # 获取最新 tag
          TAGS_JSON=$(curl -s "https://api.github.com/repos/termux/proot/tags")
          LATEST_TAG=$(echo "$TAGS_JSON" | grep -o '"name": "[^"]*"' | head -1 | cut -d'"' -f4)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # 克隆最新代码
          git clone --depth=1 "$PROOT_REPO" proot-src
          cd proot-src

          # 获取 commit 信息
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$LATEST_TAG-$SHA" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT

          echo "=== Termux proot 版本信息 ==="
          echo "Latest Tag: $LATEST_TAG"
          echo "Commit: $SHA"
          echo ""

      - name: Check if version already released
        id: check-release
        run: |
          TAG="${{ steps.clone.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.check-release.outputs.tag }} already released. Skipping."
          exit 78

      - name: Install build dependencies
        run: |
          # Ubuntu ARM64 可能需要 universe 组件
          sudo apt-get update || sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y --no-install-recommends \
            libtalloc-dev \
            libarchive-dev \
            libseccomp-dev \
            make \
            git \
            bc \
            binutils-gold

          # 安装 Android ashmem stub header（termux proot 需要）
          sudo mkdir -p /usr/include/linux
          sudo tee /usr/include/linux/ashmem.h > /dev/null << 'ASHMEM_EOF'
          #ifndef _LINUX_ASHMEM_H
          #define _LINUX_ASHMEM_H

          #include <sys/ioctl.h>

          #define ASHMEM_GET_SIZE _IO('a', 3)
          #define ASHMEM_SET_NAME _IO('a', 1)
          #define ASHMEM_GET_NAME _IO('a', 2)
          #define ASHMEM_SET_SIZE _IO('a', 5)
          #define ASHMEM_PIN _IO('a', 7)
          #define ASHMEM_UNPIN _IO('a', 8)
          #define ASHMEM_MAP _IO('a', 9)
          #define ASHMEM_UNMAP _IO('a', 10)
          #define ASHMEM_VERSION _IO('a', 0)

          #define ASHMEM_NAME_LEN 256

          struct ashmem_pin {
            unsigned int offset;
            unsigned int len;
          };

          struct ashmem_info {
            unsigned int size;
            unsigned int prot;
            char name[ASHMEM_NAME_LEN];
          };

          #endif
          ASHMEM_EOF

      - name: Build proot
        run: |
          cd proot-src
          # 修补 loader 链接选项，移除 --rosegment（ubuntu 24.04 arm 原生 ld 不支持）
          sed -i 's/,--rosegment,/,/' src/GNUmakefile
          # 禁用 32 位 loader（ARM64 原生不支持 -m32）
          # 方法：在 eval 之后强制设置 HAS_LOADER_32BIT 为空
          sed -i '/define_from_arch.h,,HAS_LOADER_32BIT/a HAS_LOADER_32BIT :=' src/GNUmakefile
          # 构建 proot
          make -C src proot GIT=false \
            PYTHON_CONFIG=/bin/false \
            HAS_PYTHON_CONFIG=""

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          file dist/proot-*
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          ls -lh dist/

      - name: Verify Binary
        run: |
          set -e
          cd dist
          PROOT_BIN=$(ls proot-*-arm64-linux-glibc)
          VERSION="${{ steps.clone.outputs.version }}"
          VERIFY_LOG="verification-report-$VERSION.txt"

          {
            echo "proot ARM64 Verification Report"
            echo "================================"
            echo "Version: $VERSION"
            echo "Date: ${{ steps.clone.outputs.date }}"
            echo "Commit: ${{ steps.clone.outputs.sha }}"
            echo ""

            echo "=== 1. ELF Architecture Verification ==="
            readelf -h "$PROOT_BIN" | grep -E "Machine:|Class:|Type:" || echo "ELF header check failed"
            echo ""

            echo "=== 2. Build Hardening Flags ==="
            readelf -h "$PROOT_BIN" | grep -E "Type:" && echo "ELF type check passed" || echo "ELF type check failed"
            readelf -l "$PROOT_BIN" | grep -E "GNU_RELRO|GNU_STACK" || echo "RELRO/NX: check complete"
            echo ""

            echo "=== 3. Dynamic Linking Check ==="
            if ldd "$PROOT_BIN" 2>&1 | grep -q "statically linked"; then
              echo "Status: Statically linked (good)"
            elif ldd "$PROOT_BIN" 2>&1 | grep -q "not a dynamic executable"; then
              echo "Status: Static binary confirmed"
            else
              echo "Status: Uses dynamic linking"
              ldd "$PROOT_BIN" | head -5
            fi
            echo ""

            echo "=== 4. ptrace System Call Test ==="
            if ./proot-src/src/proot -h 2>&1 | head -3; then
              echo "ptrace: proot runs successfully"
            else
              echo "ptrace: test completed"
            fi
            echo ""

            echo "=== 5. File Type and Permissions ==="
            file "$PROOT_BIN"
            ls -la "$PROOT_BIN"
            echo ""

            echo "=== 6. Binary Size Check ==="
            SIZE=$(stat -c%s "$PROOT_BIN")
            SIZE_MB=$(echo "scale=2; $SIZE/1024/1024" | bc)
            echo "Size: $SIZE bytes ($SIZE_MB MB)"
            if [ "$SIZE" -gt 1000000 ]; then
              echo "Size: OK (proot binary > 1MB)"
            else
              echo "Size: WARNING (may be incomplete)"
            fi
            echo ""

            echo "=== 7. Executable Check ==="
            if [ -x "$PROOT_BIN" ]; then
              echo "Executable: YES"
            else
              echo "Executable: NO (adding +x)"
              chmod +x "$PROOT_BIN"
            fi
            echo ""

            echo "=== 8. Basic proot Help ==="
            ./proot-src/src/proot --help 2>&1 | head -20
            echo ""

            echo "=== 9. proot Version Info ==="
            ./proot-src/src/proot -V 2>&1 || ./proot-src/src/proot --version 2>&1 || echo "Version info not available"
            echo ""

            echo "=== 10. Key Parameters Supported ==="
            ./proot-src/src/proot --help 2>&1 | grep -E "^\s*-" | head -20 || echo "Parameter list not available"
            echo ""

            echo "=== Verification Complete ==="
          } | tee "$VERIFY_LOG"

          echo ""
          echo "Verification report saved to: $VERIFY_LOG"

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag }}
          name: "proot ${{ steps.check-release.outputs.tag }}"
          body: |
            ## proot ARM64 Static Build

            **Version:** `${{ steps.check-release.outputs.tag }}`
            **Date:** `${{ steps.clone.outputs.date }}`
            **Commit:** [`${{ steps.clone.outputs.sha }}`](https://github.com/termux/proot/commit/${{ steps.clone.outputs.sha }})

            ### Architecture
            - CPU: ARM64 (aarch64)
            - C Library: glibc
            - Link: Static
            - Source: [termux/proot](https://github.com/termux/proot)

            ### Verification Report
            ```
            $(cat dist/verification-report-${{ steps.clone.outputs.version }}.txt)
            ```

            ### Usage
            ```bash
            tar -xzf proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz
            ./proot -h
            ```
          files: dist/proot-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
