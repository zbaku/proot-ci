name: Build proot ARM64 Static

on:
  schedule:
    - cron: '0 0 1 * *'  # First day of every month
  workflow_dispatch:         # Manual trigger

env:
  PROOT_REPO: "https://github.com/proot-me/proot.git"

jobs:
  build:
    runs-on: ubuntu-latest
    # Use ARM64 runner for native compilation
    # Note: GitHub does not provide hosted ARM64 runners, so we use cross-compilation via Docker

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone proot latest source
        id: clone
        run: |
          git clone "$PROOT_REPO" proot-src
          cd proot-src
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Check if version already released
        id: check-release
        run: |
          TAG="v0.0.0-${{ steps.clone.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.check-release.outputs.tag }} already released. Skipping."
          exit 78

      - name: Build proot using QEMU multiarch
        run: |
          # Use multiarch Docker image for ARM64 compilation
          docker run --rm --privileged \
            -v "$PWD/proot-src:/workdir/proot-src" \
            -w /workdir/proot-src \
            multiarch/qemu-user-static:arm64 \
            bash -c '
              apt-get update && apt-get install -y \
                gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
                libtalloc-dev libarchive-dev make git && \
              make -C src proot GIT=false \
                CROSS_COMPILE=aarch64-linux-gnu- \
                LDFLAGS="-static" \
                CC=aarch64-linux-gnu-gcc
            '

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          file dist/proot-*
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          ls -lh dist/

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag }}
          name: "proot ${{ steps.check-release.outputs.tag }}"
          body: |
            ## proot ARM64 Static Build

            **Version:** `${{ steps.check-release.outputs.tag }}`
            **Date:** `${{ steps.clone.outputs.date }}`
            **Commit:** [`${{ steps.clone.outputs.version }}`](https://github.com/proot-me/proot/commit/${{ steps.clone.outputs.sha }})

            ### Architecture
            - CPU: ARM64 (aarch64)
            - C Library: glibc
            - Link: Static

            ### Usage
            ```bash
            tar -xzf proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz
            ./proot -h
            ```
          files: dist/proot-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
