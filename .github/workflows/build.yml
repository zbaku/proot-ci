name: Build proot ARM64 Static

on:
  schedule:
    - cron: '0 0 1 * *'  # First day of every month
  workflow_dispatch:

env:
  PROOT_REPO: "https://github.com/proot-me/proot.git"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone proot latest source
        id: clone
        run: |
          git clone "$PROOT_REPO" proot-src
          cd proot-src
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format='%ci' | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Check if version already released
        id: check-release
        run: |
          TAG="v0.0.0-${{ steps.clone.outputs.version }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Version ${{ steps.check-release.outputs.tag }} already released. Skipping."
          exit 78

      - name: Setup ARM64 cross-compile environment
        run: |
          # Use Ubuntu ports for ARM64 packages
          sudo rm -f /etc/apt/sources.list
          cat > /tmp/sources.list << 'EOF'
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-backports main restricted universe multiverse
          EOF
          sudo cp /tmp/sources.list /etc/apt/sources.list

          # Add arm64 architecture
          sudo dpkg --add-architecture arm64

          # Update
          sudo apt-get update

          # Install ARM64 cross-compile toolchain
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libtalloc-dev:arm64 \
            libarchive-dev:arm64 \
            libseccomp-dev:arm64 \
            make \
            git

      - name: Build proot
        run: |
          cd proot-src
          # Use dynamic linking (ARM64 talloc has no static library)
          make -C src proot GIT=false \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LDFLAGS="-L/usr/aarch64-linux-gnu/lib" \
            CC=aarch64-linux-gnu-gcc \
            PYTHON_CONFIG=/bin/false \
            HAS_PYTHON_CONFIG=""

      - name: Package
        run: |
          mkdir -p dist
          cp proot-src/src/proot dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          file dist/proot-*
          tar -czf dist/proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz \
            -C dist proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc
          ls -lh dist/

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check-release.outputs.tag }}
          name: "proot ${{ steps.check-release.outputs.tag }}"
          body: |
            ## proot ARM64 Static Build

            **Version:** `${{ steps.check-release.outputs.tag }}`
            **Date:** `${{ steps.clone.outputs.date }}`
            **Commit:** [`${{ steps.clone.outputs.version }}`](https://github.com/proot-me/proot/commit/${{ steps.clone.outputs.sha }})

            ### Architecture
            - CPU: ARM64 (aarch64)
            - C Library: glibc
            - Link: Static

            ### Usage
            ```bash
            tar -xzf proot-${{ steps.clone.outputs.version }}-arm64-linux-glibc.tar.gz
            ./proot -h
            ```
          files: dist/proot-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
